# Provide Node.js AND Chromium through nix.
#
# Why nix (not apt): the Railway base is Ubuntu 24.04 (noble), where the t64
# transition renamed many libs (libasound2 -> libasound2t64, etc.), so pinning
# apt package names is fragile. The nix `chromium` package is self-contained —
# it ships all its own runtime libraries — so there are no missing-lib or
# renamed-package failures.
#
# IMPORTANT: `nixPkgs` REPLACES the auto-detected toolchain, so Node MUST be
# listed here explicitly (omitting it caused `npm ci` to fail with exit 127).
[phases.setup]
nixPkgs = ["nodejs_20", "chromium"]

[variables]
# Don't download Chromium during `npm ci`; use the nix-provided one at runtime
# (pdf-generator.ts locates it on PATH). Puppeteer respects this env var.
PUPPETEER_SKIP_DOWNLOAD = "true"
